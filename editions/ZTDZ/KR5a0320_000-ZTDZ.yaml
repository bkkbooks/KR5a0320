  text: 凝陽董眞人遇仙記帝十一
  hash: sha256:ac40410d2f8ad966b112ae0b2cf3d302213a235a76e98ca007115bc366c8d293
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0320_SJB_000-050753a, image: sjb/05/050753a.png}
body:
  text: 禄昭聞編纂眞人家世隆安本姓术虎俗稱董氏諱守志字寛甫號凝陽子元係女直人也父故不仕母夙喪娶女奚烈氏生一男二女以祖遊宦陜右遂寓居終南山大定庚子府帖夜下揀閱軍徒後烏謀克遷隴州汧陽鎮防因家焉眞人性資淳朴氣貌恢弘幼而篤孝長而異俗雖隸戎行動作云烏迥絶流輩志慕玄風而力不及行感遇正陽純陽海蟾三神仙察其累劫修行迭作間出明話前因力加點化故使抱疾拂亂其所烏有司坐是烏落軍籍眞人縁此得專心於教門焉自是而後厥疾弗瘳蒙上仙分之刀圭及鍼其膏盲授以鐵馬星印而使之執持降以符水藥力而俾之濟世留詩以勸誘之賜酒以慰諭之或歷試其所行或提策其不逮或下臨於菴所或相逢於道中靑天白日顯然見之其遇合未有如此之拳拳也眞人自遇眞以來棄俗出家結庵下志往來於德順秦隴間每每自悟隨寓行縁信從者衆請藥而藥降療病而病愈言雷而雷作禱雨而雨應出神入夢示現化人凡有起心動念者善惡必先知之發於歌頌見於詩詞岀語驚人無烟火氣也眞人於正隆庚辰年十二月二十八日生大定庚子隸於軍籍明昌乙卯九月一日出戌於德順州南寨十一日辰時與衆會食間忽見一神人身長八尺許頂分二髻容貌紫赤髭髯盛美靑袍草履仗劍造門而呼曰烏汝隱於軍中故來相接何焉不出眞人驚起墜於床下即時昏悶衆皆扶翼之至七日稍蘇四肢不能屈伸本寨千户申至總押所遣官醫驗以焉癱痪遂得長假還歸汧陽本寨求治承安丙辰三月三日未時復見神人衣白袍於門首指面大笑眞人就卧榻瞻禮忽然不見因問家人曰來者神人識之否答曰不識眞人謂家人今夜甚要洒掃精潔庶幾神人再降救我性命家人如其言已是月望日夜半神人復降光明如晝異香滿室立於前曰爲汝不省得此重疾特來救汝即於懷中取丹三粒俾安三魂藥七錠俾定七魄語之曰服此蕩散一切邪氣通身如火慎勿驚怖言畢遂失所在既服丹藥病果痊愈二十七日午時神人復降眞人喜而拜謝神人曰汝識鍾否眞人曰識是處宫觀皆有之神人笑曰汝只識撞的鍾不知聲從何來吾乃漢鍾離也焉汝累世修行有缺功行故來賜汝鐵馬可隨身執持勿得輕棄今歲運氣人多疾疫吾又賜汝法水符藥可以救人補完功行汝可每旦焚香請藥吾降藥與汝眞人依其言藥果從空降下但有疾者服之必效凡請藥之際屢見神人現於空中至誠祈請之人亦有見之也眞人每呪水必先自飲然後賜人治病日多飮水莫知其數人竟不能曉有縁遇之者眞人必以詞示之丁丑年正旦見一異人身長面黄髼頭跣足毛連蔽體麻繩繫腰兩手扮肩仰天而行丐於市中口云只化一錢與之兩錢者則云乞兒本來只化一錢安用兩錢旣得錢即指而歎曰你却有眼只焉四字教我等候一日但所化錢即以買肉將肉并餘錢包之以紙齎至河畔以手掊沙土遂取所裹肉埋之復累土如塜栽柴一枝掛紙錢於上取棗梨獻于傍扮肩而坐俟觀者衆至指云喚棗梨你棗後怎生棗得梨後怎生梨得隨以兩手插土至於埋肉亟力揚之口云棗梨不得直待恁麽如此行化數月時人號扮肩先生眞人與先生每相會輒話修眞之事凡百焉喻冀化出家眞人悟其言遂云弟子願隨先生云汝未可去待你去得時我將你去眞人問曰敢問法姓先生曰黄面劉師也復問何方人也先生曰解州芮城人也又問以修行之事先生索紙而題曰斬罷三尸水望向西流到揚州恁時好抽頭一言有神一神有言神言不信人不可乎言不顧形出言難追精定則氣定氣定則神住精氣神聚而不散眞日用也又留頌云來也無修無形質去也無修無形質其中奪取造化機恁時方可是無焉眞人深異其言先生自此别去眞人每懷之八月中秋眞人與衆習射相角勝負酒脯過傷故疾再作十月間隴州檄取驗以疾篤方落軍籍不復舊隱即日肩輿徑往白坡庵所甫及半載醫藥無效季冬生辰因自責云予重嬰疾苦是聖賢有譴耶何時復愈承安戊午正旦忽聞空中言曰既歸道矣敢食酒肉乎汝之疾端由乎此眞人聞此語改過自誓不敢重犯至上七日午時有一先生黄面皂巾長髭布袍草履擔簦而來問曰汝所苦何疾眞人告以腰膝烏患不能行履復問所患得幾時眞人曰已及半載先生曰即刻鍼剌今夜子時乃愈不然則否遂扶起倚先生膝而坐遂揣穴施鍼先剌天門次及百會一鍼在合谷二鍼在湧泉鍼畢先生欲辭而去眞人請姓宇答曰劉止先生宿不可夜旣分聞霹靂一聲眞人愕然而起腰膝舒展病若拈去是夜大雪詰旦眞人喜而掃雪至鄰庵衆焉驚異皆知遭遇上眞救療之力也承安庚申十月望日於汧陽住庵忽遇向者神人眞人急膝跪於前神人曰焉汝不能省悟吾先賜汝鐵馬今又賜汝七星寳印可作持修印馬者乃先天之物七星慧劍也汝依法修鍊吾復提汝勿得漏泄記取記取眞人拜謝間神人恍然不見泰和壬戌孟冬十七日寅時忽聞空中降語云三河口相會眞人倉惶趨進行至虚川澗口岸之南見二神人己坐盤石即鍾吕二仙也眞人拜跪於前鍾仙曰汝身垢膩太多何不入水中洗滌眞人曰唯仙又指水中一大魚曰汝能捉否眞人泝流而上搏之魚竟不獲又指一大龜曰汝能登龜背否眞人勉力而登亦不能得二仙撫掌笑曰汝魚龜俱不能得待汝洗淨垢膩捉得魚龜吾復提汝汝望西南覷及仰視間二仙恍然不見於是出水穿衣望空拜謝而歸旣至庵中覺遍體蒸熱如此彌旬每旦沐於三河頓然不食自覺有得於心常默然感於仙眞也癸亥年眞人旣入道俗眷猶存室奚烈氏親見眞人遇仙異跡遂割愛始得禮師出家乙丑年仲春望日夜見鍾仙降於上室中神光射人晃然如晝長跪於前仙誨曰汝毋以藥與人恐悞人性命損汝功行吾前與吕仙會於三河令汝洗垢膩捉魚龜汝悟其㫖乎眞人曰否仙曰垢膩者乃心垢也魚龜者乃性命也大抵修行只要除垢止念靈臺無物自得性命相守鍊成金丹脱殻飛昇遨遊仙闕汝切記取因留行藥吟其辭曰勸汝行藥兮於心無益貪救他人兮不覺自己縱然醫可兮人皆道好若是悮殺兮難還累世似此行藥兮可不痛哉子細尋思兮經綸不識吾今勸汝兮行藥勞神若不依從兮永墮沉淪莫著聲色兮是非休說再勸於子兮不得貪嗔亘古販骨兮何時得徹惜氣養神兮固蔕深根改過歸正兮舊業皆消清淨無烏兮與道合眞受人供養兮一心辦道若不進道兮萬禍臨身吾今訣破兮省悟記取性停命住兮遨遊輕舉若不改正兮一失永失依此修行兮吾來提汝復取小瓢傾酒賜之既飲而冥然不省己經七日然後稍醒見士室中功德旛蓋所須之物俱焉灰燼滿室異香不絶自兹厥後豁然大悟大安己巳上元平旦於汧陽忽聞空中降語云汝之因縁在於德順切記切記眞人亟出膽禮了無所見仲春二十五日至順德專誘門人盧自然出家既見與語若合符契庚午年德順卓庵仲冬七日夜色將分眞人縱步前院仰觀乾象適二仙乘彩雲而過眞人驚惶易衣焚香見正陽上仙青袍草履一仙面黄髯美皂巾絳服正陽手托一仙右肩立於大杏樹下霞光射目香風襲人眞人拜跪正陽仙曰汝在汧陽時有扮肩先生化汝數月不省悟汝以先生焉何人也眞人曰當時先生云解州芮城黄面劉也正陽指而笑曰即此海蟾公也後於白坡庵有一先生與汝鍼法令汝病可亦此海蟾公也烏汝前生亦是修眞之士吾與海蟾亦曾提挈賜汝道號曰凝陽子法名遇眞吾今與海蟾再來明話前因復賜舊號加以和光老人法名守志又教汝三共之道水火顛倒鍊金液還丹之法旣濟黃芽枯水銀不飛走之訣汞鉛凝結神氣相守之道即賦詩曰全神養氣得身安汞結鉛凝合自然入聖超凡歸物外何愁不做大羅仙又曰吾曾賜汝鐵馬七星寳印汝猶未省吾今焉汝言之吾昔以劍法傳洞賔令其執以修行今傳汝鐵馬星印與洞賔一同因賦二頌云其一曰七星寳印正當權復顯光明照大千鐵馬祛邪能代劍龜蛇自是兩相纏其二曰七番提挈大愚頑鬢髮蒼浪老却賢若是蹉跎歸地府人身一失永難還海蟾仙亦留頌云前世貧人號海蟾今來說破舊因縁不因累劫修行到誰肯頻頻提挈賢又以五言長篇贈之曰吾今說大道亘古人行少要固水銀瓢勿令猨偷了清淨眞無爲纖毫塵不擾黑雲一點無湛然明月皎閉口牢藏舌六根盡除掃北海黑龜兒南山赤蛇繞洞中雪飄飄爐鼎自然造鍊成無價珍同赴蓬萊島此乃修眞祕訣愼勿獨善兼汝有數子亦是前生法眷汝曾於鸑鷟山登眞洞集休觀建庵號曰凝陽與通玄子陳信道焉伴今谷神子馬善能等焉汝之門人同作修持登眞洞乃張果老仙隱通玄子即今之冰陽子陳知和也今亦付之道號法名先令盟誓而後傳法方可修行切記切記慎之戒之眞人拜謝仰視二仙復駕彩雲而升空矣於是眞人復想二仙提挈前生之言忽然大省辛未年往德順遇眞庵道友聞眞人腹中雷鳴驚異請詩二絶以示道衆崇慶癸酉仲春二十六日與師叔陳先生歸汧陽天色昏暝黄塵障空至流江峽忽遇二仙正陽海蟾也各乘花鹿而立眞人拜跪正陽曰吾先付汝修眞祕訣當夜事煩恐汝不明今復提汝勸化一切男女返眞歸道可煉大丹養冲和自然之氣運用眞水眞火汞鉛凝結烹煉成丹若不煉心定意息氣養神如何得出離輪迴之苦莫起風波休生烟火若嗔則神弱怒則氣散氣散則人亡人亡則永焉下鬼何時出期陰符經云火生於木禍發必尅姦生於國時動必潰知之修鍊謂之聖人若人發火火生則烟起烟起則不見形影暗中不覺損壞其身不可恣縱六賊三尸只要勦除猨馬屏去萬縁怕汝不信火尅金金尅木木尅土土尅水水尅火此是五行相尅之法又如金生水木生火此是地道順行即有生死只要水生金火生木此是天道逆行豈有生死乎大抵修鍊决要養就水中金此是五行顛倒法若人見吾一面三世不墮地獄已後難見吾面切記切記若漏泄天機流傳非人殃及己身罪禍必有如遇信心之人先盟誓狀當其祖先次可傳法眞人拜謝間二仙己上升矣眞人復四顧仰見一仙立於峭壁松石間適師叔至眞人曰山間仙人汝見之乎師叔曰不見眞人祝以虔懇再拜果見仙人皂巾絳袍現於松石間風袖翩翩迤𨓦而去衆雖瞻拜竟不得見師復迴德順時孟夏中旬也貞佑甲戌眞人從德順往汧陽九月望日起發十八日到隴州宿南關未時分忽見正陽神仙立於河上問曰汝今何往眞人亟拜而答曰弟子汧陽有土埪所焉人占奪今故幹此仙曰土埪直錢耶汝性命直錢耶汝只識得土埪昧了眞空著了假空汝還不省墮落頑空眞人告曰何者爲眞空仙曰眞空者遍塞虚空不染不著一靈常在問識否眞人曰不識遂以氣一噓眞人頓然省悟須臾失其所在行至汧陽惶恐不已所幹之事更不敢言論至月餘復還德順遇眞庵道友張二郞等問冬至一陽初生意㫖若何師以詞贈之貞佑乙亥德順王進卿請眞人齋畢送師至庵天已昏黑將欲吿歸眞人留宿不可眞人曰汝可將吾鐵馬歸樓上安奉若聞雷聲勿驚怖進卿一依師言夜坐昏睡忽然雷霆震動樓屋柱礎幾拔滿家驚呼進卿不覺明燈視之進卿面上髭鬚烏火所燒家人呼起稍蘇翌日舉家具香花頂鐵馬送還庵中詳陳其事眞人曰昨日雷作汝呼不省知其因乎汝樓上有一孽龍隱於樓壁掛刀中適值天雷收捉是時非吾鐵馬進卿歸而視之果見龍跡銷刃突鞘而去樓壁上爪痕尚存眞人隨機顯化人莫識之也丙子年眞人自洛水復還德順抵壽聖觀行至殿後松間忽遇二仙眞純陽海蟾曰吾於四海之内化爲貧人口口勸人不回皆縁業障深重慳貪嫉妬作業越煞奈何奈何吾有詞云日常行遊四海每日街前鬧處爲乞丐口口相違化不回暗損精神只烏凡情昧苦勸君生死大頗奈頑愚作業貪心煞不肯修眞犯天戒墮落酆都受苦無年代詞畢令眞人闡化勸縁海蟾曰吾等觀見世間迷徒種種積業萬中無一覺知汝但見女男可以勸諭令入善道外修陰德内固精神若本性不昧於慾界眞心自合於天道此箇幻軀假合四大何輕何愛吾亦傳汝詞云子細聽吾教誨說與門生莫把眞心昧若是不除墮口債走入輪迴今世人身改鬢髮蒼休得怪莫戀凡胎假合終須壞無事清閑鍊丹臺自爾純陽隨我蓬萊會眞人受教畢拜謝間二仙遂失其所在於是備云教㫖訓及四方不數年教風隆盛無有不歸信也戊寅年門人盧自然等願聞印馬源流故以歌示之元光壬午仲春十二日夜及二鼓眞人靜坐間所聞空中霹靂之聲愕然而起得降語云汝之因縁已在隴地此處不可留心汝宜聽取眞人出前院觀瞻了無所見癸未年隴州道友請師教化眞人隨機顯現慈悲指人四方奉道者莫不忻然而仰慕者亦衆矣周圍建庵數十餘所道風日盛宗門烏之廣大矣正大乙酉大旱乆不雨隴人請師作雨眞人以生靈焉心於是潜靜太虚天雨自至矣丙戌年貞元節謂門人曰我數四教指汝等生死事大辦道修眞汝等於十二時中無一時在道受了十方供養虚度時光向前還他口債受苦如何當得但起意動念須要合於天心過去一切好人皆是福縁廣大自能感動天地神明大抵修行積功累行鍊性成眞休歇無事萬縁不染眞清眞淨神氣冲和性命自然相守大丹自然凝結功成行滿聖賢自然接引汝等共我同伴能得幾時衆皆憂懼禮謝而退丁亥十月旦日揭庵名爲養浩二十三日至二十五日祥雲覆庵霹靂數四異香滿空人悉見聞焚香請曰此何故也眞人曰祖師邀我赴蓬萊之會吾將歸矣我昔遇正陽上仙時賜我印馬令我修行今將鐵馬付盧自然七星寳印付馬善能二人與我立教可爲師牧與我當日傳法一同不得輕泄懈怠自然等吿曰素無功行不敢當克辭讓再四眞人見不受威形於色目光射人衆皆驚怖眞人曰不以我教門爲念輒相違拒二人悲泣不獲已而祇受眞人呼衆門人即令拜靈陽子谷神子後遂索水浴旣訖索衣眞人曰不須綿絹厚服但布素單衣即可皆曰冬寒奈單袷何眞人曰我來時著甚來遂服單衣坐而良乆索筆留三頌其一曰陸地一法船舉棹數十年船棹都撇下我命不由天其二曰我有聚神法眞火鍊丹砂無形亦無心認得祖阿麻其三曰通神變化造物無窮我命由我天地難籠頌畢囑門人曰待我歸後宜附隴下而已言訖正未刻儼然而化矣時丁亥十月二十五登眞之後遭時多故藁葬於低村養浩庵越十二載戊戌門人靈陽子盧自然等歎日月之如流痛音容之愈遠遂自秦度隴權爲移殯親造墳庵彷徨瞻禮睹塜之北崖石上有瑞草一株狀若紫芝枝葉如蓋蓊密蔓衍蔽覆墳土命衆開穴有聲如雷挽紖舉棺啓而視之顔貌如生周身之衣芒霜如雪異香噴鼻周衣之棺奇花異草如刻如畫衆皆讚歎不已翌日扶輿挽櫬葬于隴底龜山之下時首夏十有三日也眞人資禀不凡夙性穎悟眞神仙中人也旣獲三聖口傳而面命脱馳馬試劍之習而爲修眞鍊行之歸離抗塵走俗之形而爲超凡入聖之舉向也不識之無今也筆則成書向也未嘗學問今也言則成文命意高絶於古今措詞暗合於聲韻雖博學多識文人才士有所不逮蓋其造詣極深修行極至聖賢不期而自佑詞章不學而自得宜與夫窺陳編以盜竊者大有逕庭矣門人靈陽子等親炙日乆聞見日多得師流傳遺文詩詞歌頌總四篇爲上中下三卷目曰和光集不敢自私刻梓以傳於世别集眞人出處遇眞紀年一帙曰遇仙記尚庶幾眞人昇仙證道之源流垂世立教之本末開卷而瞭然也故爲之記凝陽董眞人遇仙記
